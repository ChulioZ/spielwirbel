name: Docker

# Build the production image on every PR (validates the Dockerfile still builds),
# and on merge to main also publish it to the GitHub Container Registry so any host
# can pull a reproducible, content-addressed artifact. The actual deploy to a host
# (managed platform / VPS) is intentionally out of scope here — it needs a chosen,
# provisioned host + TLS (issue #156); this workflow stands up the image it deploys.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: read the repo, and write packages only to push the image to
# GHCR on main. The one credential is the built-in GITHUB_TOKEN — no external
# registry account or secret.
permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3

      # Only needed when we actually push (skipped on PRs, which build only).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action lowercases the image name (GHCR requires it — the repo
      # owner has a capital) and derives tags: a :sha-<commit> always, plus :latest
      # only on the default branch.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
