name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: this workflow only checks out, runs tests, and
# measures coverage.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x, 26.x]
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  # Coverage runs once on a fixed modern Node (the --test-coverage-* threshold
  # flags need Node ≥ 22.8), separate from the test matrix so plain `npm test`
  # stays runnable on every supported version. Fails the build if coverage drops
  # below the floors in the `coverage:ci` script — a guard for future auth /
  # tenant-isolation code, where an untested path can be a data-leak bug.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: npm run coverage:ci

  # PostgreSQL backend (issue #127): run the data-access-layer contract against a
  # real Postgres service container. The `test` matrix above exercises the default
  # JSON backend (no DATABASE_URL); this is additive and proves the Postgres
  # backend satisfies the same contract, which every route depends on. Since #211
  # it also runs the Knex migration test (empty-DB boot + idempotent + concurrent
  # init). The two files run with --test-concurrency=1 (one at a time) because the
  # contract file's RLS probe does cluster-global CREATE ROLE + GRANT ON ALL
  # TABLES, which shouldn't race the migration file's DDL on the shared database;
  # the advisory-locked concurrent boot is covered in-process by the migration
  # test's own Promise.all([init, init, init]).
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gamesessions
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci
      - run: node --test --test-concurrency=1 test/repo.postgres.test.js test/migrate.postgres.test.js
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/gamesessions

  # Aggregate gate (issue #364): branch protection requires only this ONE context
  # from the CI workflow. Because it depends on the whole `test` matrix (plus
  # coverage + postgres), adding, removing or bumping a Node version can never
  # again silently leave a matrix job ungated — the old failure mode where
  # required checks were pinned by exact `test (X.x)` name and desynced from the
  # matrix. Required checks go through this job; do NOT re-add individual
  # `test (X.x)` contexts to branch protection — see
  # .claude/rules/ci-aggregate-gate.md. The other workflows (Lint/Docker/
  # Secret-Scan/DCO) have stable single job names and are required directly.
  ci-passed:
    if: always() # must run even when a dependency fails, to report the failure
    needs: [test, coverage, postgres]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all CI jobs succeeded
        # needs.*.result is the array of dependency results. A plain `needs:` gate
        # SUCCEEDS when a dependency is skipped, which would silently reopen the
        # gap this job closes — so treat any non-success (failure/cancelled/
        # skipped) as a gate failure. None of test/coverage/postgres skip
        # conditionally today; the `skipped` guard is defence for a future change.
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled') ||
          contains(needs.*.result, 'skipped')
        run: exit 1
