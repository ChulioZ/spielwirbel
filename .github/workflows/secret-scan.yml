name: Secret Scan

# Belt-and-suspenders for the public repo: GitHub's own push protection is the
# first line of defense, and this scans pushes and PRs for committed secrets
# (API keys, tokens) so a leak fails CI instead of reaching main. Especially
# important ahead of going hosted, when real credentials enter the picture.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN: gitleaks only reads the checked-out history.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the scan sees every commit in the push / PR range,
          # not just the tip.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
