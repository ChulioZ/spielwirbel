<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmelden · Spielwirbel</title>
  <!-- PWA (issue #142): same manifest/icons so an install from the login screen
       is branded too. theme-color matches this page's dark background. -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#14161c" />
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <!-- Standalone login page (issue #129), intentionally independent of the SPA:
       it must render before the app (and its i18n) loads. German only — the
       app's primary UI language — and self-contained. Inline styles are allowed
       by the CSP (style-src 'unsafe-inline'); the script must be an external
       file because script-src is 'self' only. -->
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #14161c;
      color: #e8eaf0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 340px;
      background: #1e222c;
      border: 1px solid #2c3240;
      border-radius: 16px;
      padding: 2rem 1.75rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    .logo { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
    h1 { font-size: 1.15rem; font-weight: 600; text-align: center; margin: 0 0 1.5rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; color: #aab2c4; }
    input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #2c3240;
      background: #14161c;
      color: #e8eaf0;
    }
    input:focus { outline: 2px solid #6c7ae0; outline-offset: 1px; }
    button {
      width: 100%;
      margin-top: 1.1rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      border: 0;
      border-radius: 10px;
      background: #6c7ae0;
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .error {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #ff8a8a;
      text-align: center;
    }
    .error[hidden] { display: none; }
    .foot { margin-top: 1.25rem; text-align: center; font-size: 0.85rem; }
    .foot a { color: #aab2c4; }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="logo" aria-hidden="true">🌀</div>
    <h1>Spielwirbel</h1>
    <label for="password">Passwort</label>
    <input id="password" name="password" type="password" autocomplete="current-password"
           autofocus required />
    <button type="submit">Anmelden</button>
    <p class="error" id="error" role="alert" hidden>Falsches Passwort.</p>
    <!-- Public contact channel (issue #224), reachable without login. -->
    <p class="foot"><a href="/kontakt.html">Kontakt</a></p>
  </form>
  <script src="/js/login.js"></script>
</body>
</html>
