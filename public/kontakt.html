<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt · Spielwirbel</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#14161c" />
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <!-- Standalone public contact page (issue #224), reachable WITHOUT login (it is
       the phone-free §5 DDG second channel). Intentionally independent of the
       SPA: bilingual in-page (DE authoritative + EN, toggled by /js/kontakt.js),
       self-contained. Inline styles are allowed by the CSP (style-src
       'unsafe-inline'); the script must be an external file because script-src is
       'self' only. -->
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #14161c;
      color: #e8eaf0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #1e222c;
      border: 1px solid #2c3240;
      border-radius: 16px;
      padding: 2rem 1.75rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    .topline { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .logo { font-size: 1.6rem; }
    .langs { font-size: 0.85rem; }
    .langs button {
      background: none; border: 0; color: #aab2c4; cursor: pointer;
      font: inherit; padding: 0.2rem 0.35rem; border-radius: 6px;
    }
    .langs button[aria-pressed='true'] { color: #e8eaf0; font-weight: 600; text-decoration: underline; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.4rem; }
    .intro { font-size: 0.9rem; color: #aab2c4; margin: 0 0 1.4rem; }
    label { display: block; font-size: 0.85rem; margin: 1rem 0 0.4rem; color: #aab2c4; }
    input, textarea {
      width: 100%;
      padding: 0.7rem 0.85rem;
      font-size: 1rem;
      font-family: inherit;
      border-radius: 10px;
      border: 1px solid #2c3240;
      background: #14161c;
      color: #e8eaf0;
    }
    textarea { min-height: 8rem; resize: vertical; }
    input:focus, textarea:focus { outline: 2px solid #6c7ae0; outline-offset: 1px; }
    /* Honeypot: off-screen, not tab-reachable, hidden from assistive tech. Real
       users never fill it; a non-empty value is treated as a bot server-side. */
    .hp { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
    button.submit {
      width: 100%;
      margin-top: 1.4rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      border: 0;
      border-radius: 10px;
      background: #6c7ae0;
      color: #fff;
      cursor: pointer;
    }
    button.submit:disabled { opacity: 0.6; cursor: default; }
    .msg { margin-top: 1rem; font-size: 0.88rem; text-align: center; }
    .msg[hidden] { display: none; }
    .msg.ok { color: #7dd0a0; }
    .msg.err { color: #ff8a8a; }
    .foot { margin-top: 1.5rem; text-align: center; font-size: 0.85rem; }
    .foot a { color: #aab2c4; }
  </style>
</head>
<body>
  <form class="card" id="contactForm" novalidate>
    <div class="topline">
      <div class="logo" aria-hidden="true">🌀</div>
      <div class="langs" role="group" aria-label="Language">
        <button type="button" data-lang="de" aria-pressed="true">DE</button>
        <button type="button" data-lang="en" aria-pressed="false">EN</button>
      </div>
    </div>
    <h1 id="t-title">Kontakt</h1>
    <p class="intro" id="t-intro"></p>

<!-- Wrapped so kontakt.js can hide the whole input section at once when
         GET /api/config reports the channel as not configured yet (same
         all-or-nothing gate as the site footer). -->
    <div id="formFields">
      <label for="name" id="t-name-label"></label>
      <input id="name" name="name" type="text" autocomplete="name" maxlength="200" />

      <label for="email" id="t-email-label"></label>
      <input id="email" name="email" type="email" autocomplete="email" maxlength="254" required />

      <label for="subject" id="t-subject-label"></label>
      <input id="subject" name="subject" type="text" maxlength="200" />

      <label for="message" id="t-message-label"></label>
      <textarea id="message" name="message" maxlength="5000" required></textarea>

      <!-- Honeypot (spam trap) — leave empty. -->
      <div class="hp" aria-hidden="true">
        <label for="website">Website</label>
        <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
      </div>

      <button type="submit" class="submit" id="t-submit"></button>
    </div>
    <p class="msg ok" id="ok" role="status" hidden></p>
    <p class="msg err" id="err" role="alert" hidden></p>

<!-- The legal links share the availability gate (kontakt.js hides them when
         /api/config reports not-ready — the routes 404 in that state). -->
    <p class="foot"><a href="/" id="t-back"></a><span id="legalLinks">
      · <a href="/impressum">Impressum</a>
      · <a href="/datenschutz">Datenschutz</a>
      · <a href="/nutzungsbedingungen">Nutzungsbedingungen</a></span></p>
  </form>
  <script src="/js/kontakt.js"></script>
</body>
</html>
