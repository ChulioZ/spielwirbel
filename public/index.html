<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spielwirbel</title>
  <!-- PWA (issue #142): installable + offline. theme-color matches --brand. -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#c2410c" />
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Spielwirbel" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- Root-absolute paths so assets resolve on nested routes (e.g.
       /round/:rid/regal), which the server serves index.html for. -->
  <link rel="stylesheet" href="/fonts/tabler-icons.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="homeBtn" class="topbar__home" type="button" aria-label="Home"><i class="ti ti-tornado" aria-hidden="true"></i></button>
    <nav id="crumbs" class="crumbs"></nav>
    <select id="langPicker" class="lang-picker" aria-label="Language"></select>
    <!-- Feedback (issue #260): always visible, in both auth modes; wired by
         js/feedback.js. -->
    <button id="feedbackBtn" class="topbar__acct" type="button" aria-label="Feedback"><i class="ti ti-message" aria-hidden="true"></i></button>
    <!-- Account menu (issue #138): hidden unless accounts are on and the user is
         logged in; wired by js/account.js setupAccountUi(). -->
    <button id="accountBtn" class="topbar__acct" type="button" hidden aria-label="Account"><i class="ti ti-user" aria-hidden="true"></i></button>
  </header>

  <main id="app" class="app">
    <!-- Content is rendered by the js/* files -->
  </main>

<!-- Shared site footer (issue #224). Ships the public Kontakt link now; #134
       adds the Impressum + Datenschutz links here once those pages exist — don't
       add links to not-yet-built legal pages (they'd 404 on Live). Root-absolute
       paths per .claude/rules/spa-fallback-absolute-asset-paths.md; label set in
       applyStaticTexts() so it re-localizes on language change. -->
  <footer class="site-footer" role="contentinfo">
    <a href="/kontakt.html" id="footerKontakt"></a>
  </footer>

  <!-- Small toast for feedback. A permanent aria-live region (#145): it stays in
       the accessibility tree and is shown/hidden with a class, because a live
       region that only appears together with its text is never announced. -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Order matters: i18n + languages first, core next, main (bootstrap) last. -->
  <script src="/js/i18n.js"></script>
  <script src="/js/lang/en.js"></script>
  <script src="/js/lang/de.js"></script>
  <script src="/js/cover.js"></script>
  <script src="/js/cover-size.js"></script>
  <script src="/js/tag-icons.js"></script>
  <script src="/js/swr.js"></script>
  <script src="/js/focus-trap.js"></script>
  <script src="/js/core.js"></script>
  <script src="/js/account.js"></script>
  <script src="/js/ranking.js"></script>
  <script src="/js/lookup-group.js"></script>
  <script src="/js/lookup-cover.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/views-home.js"></script>
  <script src="/js/views-round.js"></script>
  <script src="/js/views-round-tabs.js"></script>
  <script src="/js/views-round-detail.js"></script>
  <script src="/js/views-round-lookup.js"></script>
  <script src="/js/views-member.js"></script>
  <script src="/js/views-session.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/main.js"></script>
  <!-- Registers the service worker; standalone IIFE, order-independent. -->
  <script src="/js/pwa.js"></script>
</body>
</html>
